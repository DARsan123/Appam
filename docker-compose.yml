services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vms
      POSTGRES_PASSWORD: vms_secret
      POSTGRES_DB: iiml_vms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
